apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
        env:
        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: nginx-config
              key: version
        ports:
        - containerPort: 80
